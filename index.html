<!DOCTYPE html>
<html>
<head>
  <title>Grove Portal</title>
</head>

<body style="background:black;color:red;text-align:center;padding-top:50px;">

<h1>The Grove</h1>

<button id="enterBtn">Enter The Fold 🔻🔻🔻</button>

<div id="box" style="display:none;margin-top:20px;">

  <div id="notes" style="border:1px solid red;padding:10px;width:300px;margin:auto;margin-bottom:10px;">
    Loading...
  </div>

  <input id="name" placeholder="Name"><br><br>
  <input id="message" placeholder="Message"><br><br>

  <button id="sendBtn">Send</button>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const client = window.supabase.createClient(
  "https://vltunwjftktmaaiicbny.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZsdHVud2pmdGt0bWFhaWljY255Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjkxNDY5NjQsImV4cCI6MjA4NDcyMjk2NH0.hQcnLrb7TgH37eek5FOlOgtwKfE2IlEWzxG35vzqS7Q"
);

document.getElementById("enterBtn").onclick = () => {
  document.getElementById("box").style.display = "block";
  load();
};

document.getElementById("sendBtn").onclick = async () => {
  const name = document.getElementById("name").value || "Anonymous";
  const message = document.getElementById("message").value;

  if (!message) return;

  const { error } = await client
    .from("grove_notes")
    .insert([{ name, message }]);

  if (error) {
    alert("SEND ERROR: " + error.message);
    return;
  }

  document.getElementById("message").value = "";
  load();
};

async function load() {
  const notes = document.getElementById("notes");
  notes.innerHTML = "Loading...";

  const { data, error } = await client
    .from("grove_notes")
    .select("*")
    .order("created_at", { ascending: true });

  if (error) {
    notes.innerHTML = "LOAD ERROR: " + error.message;
    return;
  }

  notes.innerHTML = "";

  if (!data.length) {
    notes.innerHTML = "No messages yet.";
    return;
  }

  data.forEach(row => {
    const div = document.createElement("div");
    div.innerText = row.name + ": " + row.message;
    notes.appendChild(div);
  });
}
</script>

</body>
</html>
