<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Grove</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: #000;
      color: #ff2a2a;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 40px 16px;
      box-sizing: border-box;
    }

    h1 {
      margin: 0 0 20px 0;
      font-size: 42px;
    }

    button,
    input {
      font: inherit;
    }

    #enterBtn,
    #sendBtn {
      background: #000;
      color: #ff2a2a;
      border: 1px solid #ff2a2a;
      padding: 10px 16px;
      cursor: pointer;
    }

    #box {
      display: none;
      margin-top: 20px;
    }

    #status {
      margin-bottom: 12px;
      min-height: 24px;
    }

    #notes {
      border: 1px solid #ff2a2a;
      padding: 10px;
      width: 100%;
      max-width: 360px;
      height: 240px;
      overflow: auto;
      margin: 0 auto 12px auto;
      text-align: left;
      box-sizing: border-box;
      white-space: pre-wrap;
      word-break: break-word;
    }

    #name,
    #message {
      width: 100%;
      max-width: 360px;
      padding: 10px;
      margin-bottom: 10px;
      box-sizing: border-box;
      background: #000;
      color: #ff2a2a;
      border: 1px solid #ff2a2a;
    }

    .note {
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <h1>The Grove</h1>

  <button id="enterBtn">Enter The Fold 🔻🔻🔻</button>

  <div id="box">
    <div id="status">Status: idle</div>
    <div id="notes">Waiting...</div>

    <input id="name" placeholder="Name" />
    <br />
    <input id="message" placeholder="Message" />
    <br />
    <button id="sendBtn">Send</button>
  </div>

  <script>
    const statusEl = document.getElementById("status");
    const notesEl = document.getElementById("notes");
    const boxEl = document.getElementById("box");
    const enterBtn = document.getElementById("enterBtn");
    const sendBtn = document.getElementById("sendBtn");
    const nameEl = document.getElementById("name");
    const messageEl = document.getElementById("message");

    enterBtn.onclick = async () => {
      boxEl.style.display = "block";
      await loadNotes();
    };

    sendBtn.onclick = async () => {
      const name = nameEl.value.trim() || "Anonymous";
      const message = messageEl.value.trim();

      if (!message) {
        statusEl.innerText = "Status: message is empty";
        return;
      }

      statusEl.innerText = "Status: sending...";

      try {
        const res = await fetch("/api/send-note", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name, message })
        });

        const result = await res.json();

        if (!res.ok) {
          statusEl.innerText = "SEND ERROR: " + (result.error || "Unknown error");
          return;
        }

        messageEl.value = "";
        statusEl.innerText = "Status: sent ✅";
        await loadNotes();
      } catch (err) {
        statusEl.innerText = "SEND CATCH ERROR: " + err.message;
      }
    };

    async function loadNotes() {
      notesEl.innerText = "Loading...";

      try {
        const res = await fetch("/api/get-notes");
        const result = await res.json();

        if (!res.ok) {
          notesEl.innerText = "LOAD ERROR: " + (result.error || "Unknown error");
          return;
        }

        const data = result.data;

        if (!data || data.length === 0) {
          notesEl.innerText = "No messages yet.";
          return;
        }

        notesEl.innerHTML = "";

        data.forEach((row) => {
          const div = document.createElement("div");
          div.className = "note";
          div.innerHTML =
            "<strong>" + escapeHtml(row.name) + "</strong>: " +
            escapeHtml(row.message);
          notesEl.appendChild(div);
        });

        notesEl.scrollTop = notesEl.scrollHeight;
      } catch (err) {
        notesEl.innerText = "LOAD CATCH ERROR: " + err.message;
      }
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
  </script>
</body>
</html>
