<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>The Grove</title>
</head>
<body style="background:black;color:red;text-align:center;padding-top:40px;font-family:Arial,sans-serif;">
  <h1>The Grove</h1>
  <button id="enterBtn">Enter The Fold 🔻🔻🔻</button>

  <div id="box" style="display:none;margin-top:20px;">
    <div id="status" style="margin-bottom:10px;">Status: idle</div>

    <div id="notes" style="border:1px solid red;padding:10px;width:320px;height:220px;overflow:auto;margin:0 auto 12px auto;text-align:left;">
      Waiting...
    </div>

    <input id="name" placeholder="Name" style="margin-bottom:8px;width:320px;padding:8px;"><br>
    <input id="message" placeholder="Message" style="margin-bottom:8px;width:320px;padding:8px;"><br>
    <button id="sendBtn">Send</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://vltunwjftktmaaiicbny.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZsdHVud2pmdGt0bWFhaWljY255Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjkxNDY5NjQsImV4cCI6MjA4NDcyMjk2NH0.hQcnLrb7TgH37eek5FOlOgtwKfE2IlEWzxG35vzqS7Q";

    const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const statusEl = document.getElementById("status");
    const notesEl = document.getElementById("notes");
    const boxEl = document.getElementById("box");
    const enterBtn = document.getElementById("enterBtn");
    const sendBtn = document.getElementById("sendBtn");

    enterBtn.onclick = async () => {
      boxEl.style.display = "block";
      await pingApi();
      await loadNotes();
    };

    sendBtn.onclick = async () => {
      const name = document.getElementById("name").value.trim() || "Anonymous";
      const message = document.getElementById("message").value.trim();

      if (!message) {
        statusEl.innerText = "Status: message is empty";
        return;
      }

      statusEl.innerText = "Status: sending...";

      try {
        const { error } = await client
          .from("grove_notes")
          .insert([{ name, message }]);

        if (error) {
          statusEl.innerText = "SEND ERROR: " + error.message;
          return;
        }

        document.getElementById("message").value = "";
        statusEl.innerText = "Status: sent ✅";
        await loadNotes();
      } catch (err) {
        statusEl.innerText = "SEND CATCH ERROR: " + err.message;
      }
    };

    async function pingApi() {
      try {
        const res = await fetch(SUPABASE_URL + "/rest/v1/", {
          method: "GET",
          headers: {
            apikey: SUPABASE_KEY,
            Authorization: "Bearer " + SUPABASE_KEY
          }
        });
        statusEl.innerText = "API TEST: " + res.status;
      } catch (err) {
        statusEl.innerText = "API TEST FAILED: " + err.message;
      }
    }

    async function loadNotes() {
      notesEl.innerText = "Loading...";

      try {
        const { data, error } = await client
          .from("grove_notes")
          .select("*")
          .order("created_at", { ascending: true });

        if (error) {
          notesEl.innerText = "LOAD ERROR: " + error.message;
          return;
        }

        if (!data || data.length === 0) {
          notesEl.innerText = "No messages yet.";
          return;
        }

        notesEl.innerHTML = "";
        data.forEach((row) => {
          const div = document.createElement("div");
          div.style.marginBottom = "8px";
          div.textContent = row.name + ": " + row.message;
          notesEl.appendChild(div);
        });
      } catch (err) {
        notesEl.innerText = "LOAD CATCH ERROR: " + err.message;
      }
    }
  </script>
</body>
</html>
