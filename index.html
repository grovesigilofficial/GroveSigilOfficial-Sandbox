<!DOCTYPE html>
<html>
<head>
<title>The Grove</title>
</head>

<body style="background:black; color:red; text-align:center; padding-top:100px;">

<h1>The Grove</h1>

<button onclick="openBox()">Enter The Fold 🔻🔻🔻</button>

<div id="box" style="display:none; margin-top:20px;">

  <div id="notes" style="border:1px solid red; padding:10px; max-width:400px; margin:auto; margin-bottom:10px;">
    Loading messages...
  </div>

  <input id="name" placeholder="Name"><br><br>
  <input id="message" placeholder="Message"><br><br>

  <button onclick="sendMessage()">Send</button>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL = "https://vltunwjftktmaaiicbny.supabase.co";
const SUPABASE_KEY = "PASTE_YOUR_REAL_ANON_KEY_HERE";

const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function openBox() {
  document.getElementById("box").style.display = "block";
  loadMessages();
}

async function loadMessages() {
  const notes = document.getElementById("notes");
  notes.innerHTML = "Loading messages...";

  const { data, error } = await client
    .from("grove_test_messages")
    .select("*")
    .order("created_at", { ascending: true });

  console.log("LOAD DATA:", data);
  console.log("LOAD ERROR:", error);

  if (error) {
    notes.innerHTML = "ERROR: " + error.message;
    return;
  }

  notes.innerHTML = "";

  if (!data || data.length === 0) {
    notes.innerHTML = "No messages yet.";
    return;
  }

  data.forEach(msg => {
    const div = document.createElement("div");
    div.innerText = msg.name + ": " + msg.message;
    notes.appendChild(div);
  });
}

async function sendMessage() {
  const name = document.getElementById("name").value || "Anonymous";
  const message = document.getElementById("message").value;

  if (!message) return;

  const { data, error } = await client
    .from("grove_test_messages")
    .insert([{ name, message }])
    .select();

  console.log("SEND DATA:", data);
  console.log("SEND ERROR:", error);

  if (error) {
    alert("SEND ERROR: " + error.message);
    return;
  }

  document.getElementById("message").value = "";
  loadMessages();
}
</script>

</body>
</html>
