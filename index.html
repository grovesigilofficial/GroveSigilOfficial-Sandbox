<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The Grove Portal</title>

<style>
body{
  margin:0;
  background:black;
  color:#ff1a1a;
  font-family:Georgia, serif;
  text-align:center;
  padding-top:60px;
}

/* glowing title */
@keyframes glowPulse{
  0%{text-shadow:0 0 10px #ff0000,0 0 25px #990000;}
  50%{text-shadow:0 0 20px #ff0000,0 0 45px #ff0000;}
  100%{text-shadow:0 0 10px #ff0000,0 0 25px #990000;}
}

h1{
  font-size:72px;
  margin:0;
  animation:glowPulse 4s infinite;
}

.subtitle{
  margin-bottom:40px;
  opacity:.8;
}

button{
  background:black;
  border:1px solid #ff1a1a;
  color:#ff1a1a;
  padding:10px 20px;
  cursor:pointer;
}

button:hover{
  box-shadow:0 0 10px red;
}

#groveChamber{
  display:none;
  margin-top:40px;
  width:90%;
  max-width:600px;
  margin-left:auto;
  margin-right:auto;
}

/* notes table */
#notes{
  width:100%;
  max-height:250px;
  margin:auto;
  overflow-y:auto;
  border:1px solid #ff1a1a;
  padding:10px;
  text-align:left;
}

.note{
  margin-bottom:6px;
}

input{
  background:black;
  border:1px solid #ff1a1a;
  color:#ff1a1a;
  padding:6px;
  margin:4px 0;
  width:calc(100% - 14px);
}

#addNoteBtn{
  margin-top:10px;
  width:100%;
}
</style>
</head>

<body>

<h1>The Grove</h1>
<div class="subtitle">by Bleedvow • GroveSigilOfficial</div>

<button id="enterBtn">Enter The Fold</button>

<div id="groveChamber">
  <div id="notes">Loading notes...</div>

  <input id="nameInput" placeholder="Name">
  <input id="messageInput" placeholder="Leave a message">
  <button id="addNoteBtn">Leave Note</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = "https://vltunwjftktmaaiicbny.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZsdHVud2pmdGt0bWFhaWljY255Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjkxNDY5NjQsImV4cCI6MjA4NDcyMjk2NH0.hQcnLrb7TgH37eek5FOlOgtwKfE2IlEWzxG35vzqS7Q";

const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const enterBtn = document.getElementById("enterBtn");
const chamber = document.getElementById("groveChamber");
const notesEl = document.getElementById("notes");
const addBtn = document.getElementById("addNoteBtn");

enterBtn.onclick = () => {
  chamber.style.display = "block";
  loadNotes();
};

addBtn.onclick = async () => {
  const name = document.getElementById("nameInput").value.trim() || "Anonymous";
  const message = document.getElementById("messageInput").value.trim();
  if(!message) return;

  try {
    const { error } = await supabase
      .from("grove_notes")
      .insert([{ name, message }]);

    if(error) throw error;

    document.getElementById("messageInput").value = "";
    loadNotes();
  } catch (err) {
    notesEl.innerHTML = "Failed to submit note. Check console.";
    console.error(err);
  }
};

async function loadNotes() {
  notesEl.innerHTML = "Loading notes...";
  try {
    const { data, error } = await supabase
      .from("grove_notes")
      .select("*")
      .order("created_at", { ascending: true });

    if(error) throw error;

    notesEl.innerHTML = "";
    data.forEach(note => {
      const div = document.createElement("div");
      div.className = "note";
      const time = new Date(note.created_at).toLocaleTimeString();
      div.innerHTML = `<b>${note.name}</b>: ${note.message} <span style="opacity:.6;font-size:10px">(${time})</span>`;
      notesEl.appendChild(div);
    });

    notesEl.scrollTop = notesEl.scrollHeight;
  } catch (err) {
    notesEl.innerHTML = "Failed to load notes. Check console.";
    console.error(err);
  }
}
</script>

</body>
</html>
