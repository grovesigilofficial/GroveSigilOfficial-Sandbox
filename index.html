<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Grove</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: #000;
      color: #ff2a2a;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 40px 16px;
      box-sizing: border-box;
    }

    h1 {
      margin: 0 0 20px 0;
      font-size: 42px;
    }

    button,
    input {
      font: inherit;
    }

    #enterBtn,
    #sendBtn {
      background: #000;
      color: #ff2a2a;
      border: 1px solid #ff2a2a;
      padding: 10px 16px;
      cursor: pointer;
    }

    #box {
      display: none;
      margin-top: 20px;
    }

    #status {
      margin-bottom: 12px;
      min-height: 24px;
    }

    #notes {
      border: 1px solid #ff2a2a;
      padding: 10px;
      width: 100%;
      max-width: 360px;
      height: 240px;
      overflow: auto;
      margin: 0 auto 12px auto;
      text-align: left;
      box-sizing: border-box;
      white-space: pre-wrap;
      word-break: break-word;
    }

    #name,
    #message {
      width: 100%;
      max-width: 360px;
      padding: 10px;
      margin-bottom: 10px;
      box-sizing: border-box;
      background: #000;
      color: #ff2a2a;
      border: 1px solid #ff2a2a;
    }

    .note {
      margin-bottom: 8px;
    }

    .muted {
      opacity: 0.8;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <h1>The Grove</h1>

  <button id="enterBtn">Enter The Fold 🔻🔻🔻</button>

  <div id="box">
    <div id="status">Status: idle</div>

    <div id="notes">Waiting...</div>

    <input id="name" placeholder="Name" />
    <br />
    <input id="message" placeholder="Message" />
    <br />
    <button id="sendBtn">Send</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://vltunwjftktmaaiicbny.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZsdHVud2pmdGt0bWFhaWljY255Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjkxNDY5NjQsImV4cCI6MjA4NDcyMjk2NH0.hQcnLrb7TgH37eek5FOlOgtwKfE2IlEWzxG35vzqS7Q";

    const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const statusEl = document.getElementById("status");
    const notesEl = document.getElementById("notes");
    const boxEl = document.getElementById("box");
    const enterBtn = document.getElementById("enterBtn");
    const sendBtn = document.getElementById("sendBtn");
    const nameEl = document.getElementById("name");
    const messageEl = document.getElementById("message");

    enterBtn.onclick = async () => {
      boxEl.style.display = "block";
      await pingApi();
      await loadNotes();
    };

    sendBtn.onclick = async () => {
      const name = nameEl.value.trim() || "Anonymous";
      const message = messageEl.value.trim();

      if (!message) {
        statusEl.innerText = "Status: message is empty";
        return;
      }

      statusEl.innerText = "Status: sending...";

      try {
        const { error } = await client
          .from("grove_notes")
          .insert([{ name, message }]);

        if (error) {
          statusEl.innerText = "SEND ERROR: " + error.message;
          return;
        }

        messageEl.value = "";
        statusEl.innerText = "Status: sent ✅";
        await loadNotes();
      } catch (err) {
        statusEl.innerText = "SEND CATCH ERROR: " + err.message;
      }
    };

    async function pingApi() {
      try {
        const res = await fetch(SUPABASE_URL + "/rest/v1/", {
          method: "GET",
          headers: {
            apikey: SUPABASE_KEY,
            Authorization: "Bearer " + SUPABASE_KEY
          }
        });
        statusEl.innerText = "API TEST: " + res.status;
      } catch (err) {
        statusEl.innerText = "API TEST FAILED: " + err.message;
      }
    }

    async function loadNotes() {
      notesEl.innerText = "Loading...";

      try {
        const { data, error } = await client
          .from("grove_notes")
          .select("*")
          .order("created_at", { ascending: true });

        if (error) {
          notesEl.innerText = "LOAD ERROR: " + error.message;
          return;
        }

        if (!data || data.length === 0) {
          notesEl.innerText = "No messages yet.";
          return;
        }

        notesEl.innerHTML = "";

        data.forEach((row) => {
          const div = document.createElement("div");
          div.className = "note";
          div.innerHTML =
            "<strong>" + escapeHtml(row.name) + "</strong>: " +
            escapeHtml(row.message);
          notesEl.appendChild(div);
        });

        notesEl.scrollTop = notesEl.scrollHeight;
      } catch (err) {
        notesEl.innerText = "LOAD CATCH ERROR: " + err.message;
      }
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
  </script>
</body>
</html>
