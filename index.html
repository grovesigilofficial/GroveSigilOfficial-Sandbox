<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The Grove Portal</title>

<style>
body{
  margin:0;
  background:black;
  color:#ff1a1a;
  font-family:Georgia, serif;
  text-align:center;
  padding-top:60px;
}

/* glowing title */
@keyframes glowPulse{
  0%{text-shadow:0 0 10px #ff0000,0 0 25px #990000;}
  50%{text-shadow:0 0 20px #ff0000,0 0 45px #ff0000;}
  100%{text-shadow:0 0 10px #ff0000,0 0 25px #990000;}
}

h1{
  font-size:72px;
  margin:0;
  animation:glowPulse 4s infinite;
}

.subtitle{
  margin-bottom:40px;
  opacity:.8;
}

button{
  background:black;
  border:1px solid #ff1a1a;
  color:#ff1a1a;
  padding:10px 20px;
  cursor:pointer;
}

button:hover{
  box-shadow:0 0 10px red;
}

#groveChamber{
  display:none;
  margin-top:40px;
}

/* notes table */

#notes{
  width:600px;
  max-height:250px;
  margin:auto;
  overflow-y:auto;
  border:1px solid #ff1a1a;
  padding:10px;
  text-align:left;
}

.note{
  margin-bottom:6px;
}

input{
  background:black;
  border:1px solid #ff1a1a;
  color:#ff1a1a;
  padding:6px;
}
</style>
</head>

<body>

<h1>The Grove</h1>
<div class="subtitle">by Bleedvow • GroveSigilOfficial</div>

<button id="enterBtn">Enter The Fold</button>

<div id="groveChamber">

<br>

<div id="notes"></div>

<br>

<input id="nameInput" placeholder="Name">

<input id="messageInput" placeholder="Leave a message">

<button id="addNoteBtn">Leave Note</button>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

/* YOUR SUPABASE PROJECT */

const SUPABASE_URL = "https://vltunwjftktmaaiicbny.supabase.co"

const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZsdHVud2pmdGt0bWFhaWljY255Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjkxNDY5NjQsImV4cCI6MjA4NDcyMjk2NH0.hQcnLrb7TgH37eek5FOlOgtwKfE2IlEWzxG35vzqS7Q"

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

/* open chamber */

const enterBtn = document.getElementById("enterBtn")
const chamber = document.getElementById("groveChamber")

enterBtn.onclick = () => {

  chamber.style.display="block"

  loadNotes()

}

/* add note */

const addBtn = document.getElementById("addNoteBtn")

addBtn.onclick = async () => {

  const name =
  document.getElementById("nameInput").value || "Anonymous"

  const message =
  document.getElementById("messageInput").value

  if(!message) return

  await supabaseClient
  .from("grove_notes")
  .insert([{name,message}])

  document.getElementById("messageInput").value=""

  loadNotes()

}

/* load notes */

async function loadNotes(){

  const {data} =
  await supabaseClient
  .from("grove_notes")
  .select("*")
  .order("created_at",{ascending:true})

  const notes = document.getElementById("notes")

  notes.innerHTML=""

  data.forEach(note=>{

    const div=document.createElement("div")

    div.className="note"

    const time =
    new Date(note.created_at).toLocaleTimeString()

    div.innerHTML =
    "<b>"+note.name+"</b>: "+
    note.message+
    " <span style='opacity:.6;font-size:10px'>("+time+")</span>"

    notes.appendChild(div)

  })

}

</script>

</body>
</html>
