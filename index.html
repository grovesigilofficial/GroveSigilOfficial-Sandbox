<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The Grove Test</title>
<style>
body {
  background: black;
  color: #ff1a1a;
  font-family: Georgia, serif;
  text-align: center;
  padding: 40px;
}

h1 { font-size: 48px; margin-bottom: 20px; }
input, button { padding: 8px; margin: 5px; }
input { width: 200px; border: 1px solid #ff1a1a; background: black; color: #ff1a1a; }
button { border: 1px solid #ff1a1a; background: black; color: #ff1a1a; cursor: pointer; }
#messages { border: 1px solid #ff1a1a; padding: 10px; width: 300px; margin: 20px auto; max-height: 200px; overflow-y: auto; text-align: left; }
.message { margin-bottom: 6px; }
</style>
</head>
<body>

<h1>The Grove Test</h1>

<input type="text" id="msgInput" placeholder="Write a message">
<button id="submitBtn">Send</button>

<div id="messages">Loading messages...</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// --- Supabase setup ---
const SUPABASE_URL = "https://vltunwjftktmaaiicbny.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZsdHVud2pmdGt0bWFhaWljY255Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjkxNDY5NjQsImV4cCI6MjA4NDcyMjk2NH0.hQcnLrb7TgH37eek5FOlOgtwKfE2IlEWzxG35vzqS7Q";
const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// --- Elements ---
const msgInput = document.getElementById("msgInput");
const submitBtn = document.getElementById("submitBtn");
const messagesEl = document.getElementById("messages");

// --- Load messages ---
async function loadMessages() {
  messagesEl.innerHTML = "Loading messages...";
  try {
    const { data, error } = await supabase
      .from("grove_test_messages")
      .select("*")
      .order("created_at", { ascending: true });

    if(error) throw error;

    messagesEl.innerHTML = "";
    data.forEach(m => {
      const div = document.createElement("div");
      div.className = "message";
      div.textContent = m.message + " (" + new Date(m.created_at).toLocaleTimeString() + ")";
      messagesEl.appendChild(div);
    });
  } catch (err) {
    messagesEl.innerHTML = "Failed to load messages. Check console.";
    console.error(err);
  }
}

// --- Submit message ---
submitBtn.onclick = async () => {
  const message = msgInput.value.trim();
  if(!message) return;

  try {
    const { error } = await supabase
      .from("grove_test_messages")
      .insert([{ message }]);

    if(error) throw error;

    msgInput.value = "";
    loadMessages();
  } catch(err) {
    messagesEl.innerHTML = "Failed to submit message. Check console.";
    console.error(err);
  }
};

// Initial load
loadMessages();
</script>

</body>
</html>
