<!DOCTYPE html>
<html>
<head>
  <title>Grove Portal</title>
</head>

<body style="background:black;color:red;text-align:center;padding-top:50px;">

<h1>The Grove</h1>

<button id="enterBtn">Enter The Fold 🔻🔻🔻</button>

<div id="box" style="display:none;margin-top:20px;">

  <div id="status" style="margin-bottom:10px;">Status: idle</div>

  <div id="notes" style="border:1px solid red;padding:10px;width:300px;margin:auto;margin-bottom:10px;">
    Loading...
  </div>

  <input id="name" placeholder="Name"><br><br>
  <input id="message" placeholder="Message"><br><br>

  <button id="sendBtn">Send</button>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL = "https://vltunwjftktmaaiicbny.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZsdHVud2pmdGt0bWFhaWljY255Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjkxNDY5NjQsImV4cCI6MjA4NDcyMjk2NH0.hQcnLrb7TgH37eek5FOlOgtwKfE2IlEWzxG35vzqS7Q";

const statusEl = document.getElementById("status");
const notesEl = document.getElementById("notes");

let client;

try {
  client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  statusEl.innerText = "Status: Supabase client created";
} catch (e) {
  statusEl.innerText = "Client ERROR: " + e.message;
}

document.getElementById("enterBtn").onclick = () => {
  document.getElementById("box").style.display = "block";
  testConnection();
};

document.getElementById("sendBtn").onclick = async () => {
  const name = document.getElementById("name").value || "Anonymous";
  const message = document.getElementById("message").value;

  if (!message) return;

  statusEl.innerText = "Sending...";

  try {
    const { error } = await client
      .from("grove_notes")
      .insert([{ name, message }]);

    if (error) throw error;

    document.getElementById("message").value = "";
    statusEl.innerText = "Message sent ✅";
    loadNotes();

  } catch (err) {
    statusEl.innerText = "SEND ERROR: " + err.message;
  }
};

async function testConnection() {
  statusEl.innerText = "Testing connection...";

  try {
    const res = await fetch(SUPABASE_URL);
    statusEl.innerText = "Fetch OK: " + res.status;
    loadNotes();
  } catch (err) {
    statusEl.innerText = "FETCH FAILED ❌";
    notesEl.innerText = "Your browser is blocking Supabase.";
  }
}

async function loadNotes() {
  notesEl.innerText = "Loading...";

  try {
    const { data, error } = await client
      .from("grove_notes")
      .select("*")
      .order("created_at", { ascending: true });

    if (error) throw error;

    notesEl.innerHTML = "";

    if (!data.length) {
      notesEl.innerText = "No messages yet.";
      return;
    }

    data.forEach(row => {
      const div = document.createElement("div");
      div.innerText = row.name + ": " + row.message;
      notesEl.appendChild(div);
    });

  } catch (err) {
    notesEl.innerText = "LOAD ERROR: " + err.message;
  }
}
</script>

</body>
</html>
