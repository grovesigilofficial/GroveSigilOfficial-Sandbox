<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Grove – Step 3</title>
  <style>
    body {
      margin: 0;
      background: black;
      color: #ff1a1a;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 40px 16px;
    }

    h1 {
      font-size: 48px;
      margin-bottom: 20px;
    }

    button {
      background: black;
      color: #ff1a1a;
      border: 1px solid #ff1a1a;
      padding: 10px 16px;
      cursor: pointer;
      font-size: 16px;
    }

    #box {
      display: none;
      margin-top: 20px;
      border: 1px solid #ff1a1a;
      padding: 20px;
      max-width: 500px;
      margin-left: auto;
      margin-right: auto;
    }

    input, textarea {
      display: block;
      width: 90%;
      margin: 10px auto;
      padding: 8px;
      background: black;
      color: #ff1a1a;
      border: 1px solid #ff1a1a;
      font-size: 14px;
    }

    textarea {
      resize: vertical;
    }

    .message {
      border-top: 1px solid #ff1a1a;
      padding: 6px 0;
      text-align: left;
      font-size: 14px;
    }

    .message strong {
      color: #ff6666;
    }
  </style>
</head>
<body>
  <h1>The Grove</h1>
  <button id="enterBtn">Enter The Fold 🔻🔻🔻</button>

  <div id="box">
    <p>Welcome to the Grove Chamber! UI works.</p>

    <input type="text" id="nameInput" placeholder="Your Name">
    <textarea id="messageInput" rows="4" placeholder="Your Message"></textarea>
    <button id="sendBtn">Send</button>

    <div id="messages"></div>
  </div>

  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const enterBtn = document.getElementById("enterBtn");
    const box = document.getElementById("box");
    const sendBtn = document.getElementById("sendBtn");
    const nameInput = document.getElementById("nameInput");
    const messageInput = document.getElementById("messageInput");
    const messagesDiv = document.getElementById("messages");

    enterBtn.onclick = () => {
      box.style.display = "block";
      fetchMessages();
    };

    // Initialize Supabase
    const supabaseUrl = "YOUR_SUPABASE_URL";
    const supabaseKey = "YOUR_SUPABASE_ANON_KEY";
    const supabase = supabase.createClient(supabaseUrl, supabaseKey);

    async function fetchMessages() {
      const { data, error } = await supabase
        .from("messages")
        .select("*")
        .order("id", { ascending: true });

      if (error) {
        console.error("Error fetching messages:", error);
        return;
      }

      messagesDiv.innerHTML = "";
      data.forEach(msg => {
        const div = document.createElement("div");
        div.className = "message";
        div.innerHTML = `<strong>${msg.name}:</strong> ${msg.message}`;
        messagesDiv.appendChild(div);
      });
    }

    sendBtn.onclick = async () => {
      const name = nameInput.value.trim();
      const message = messageInput.value.trim();
      if (!name || !message) {
        alert("Please enter both name and message!");
        return;
      }

      const { data, error } = await supabase
        .from("messages")
        .insert([{ name, message }]);

      if (error) {
        console.error("Error sending message:", error);
        alert("Failed to send message.");
        return;
      }

      nameInput.value = "";
      messageInput.value = "";
      fetchMessages();
    };
  </script>
</body>
</html>
